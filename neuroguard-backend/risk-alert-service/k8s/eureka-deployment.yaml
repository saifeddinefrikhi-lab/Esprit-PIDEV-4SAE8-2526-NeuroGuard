apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: neuroguard
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: neuroguard
  labels:
    app: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: steeltoeoss/eureka-server:latest
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 120   # ← was 30s, Eureka needs 2+ min to start
            periodSeconds: 10
            failureThreshold: 12       # ← was 6, gives 2 more minutes of retries
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 180   # ← start liveness check after 3 min
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
