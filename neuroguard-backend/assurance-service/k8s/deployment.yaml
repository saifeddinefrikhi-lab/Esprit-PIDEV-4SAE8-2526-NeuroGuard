apiVersion: apps/v1
kind: Deployment
metadata:
  name: assurance-service
  namespace: neuroguard
  labels:
    app: assurance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assurance-service
  template:
    metadata:
      labels:
        app: assurance-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mysql-service 3306; do echo 'waiting for mysql-service:3306'; sleep 5; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-service 6379; do echo 'waiting for redis-service:6379'; sleep 5; done
        - name: wait-for-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z eureka-server 8761; do echo 'waiting for eureka-server:8761'; sleep 5; done
      containers:
        - name: assurance-service
          image: ameniferjeni/assurance-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8093
          envFrom:
            - configMapRef:
                name: assurance-service-config
            - secretRef:
                name: assurance-service-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60      # ← 60 × 10s = 600s max startup time
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
