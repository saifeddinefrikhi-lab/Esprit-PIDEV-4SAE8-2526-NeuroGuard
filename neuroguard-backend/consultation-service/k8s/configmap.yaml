apiVersion: v1
kind: ConfigMap
metadata:
  name: consultation-service-config
  namespace: neuroguard
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/consultation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_REDIS_HOST: "redis-service"
  SPRING_REDIS_PORT: "6379"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka"
  SERVER_PORT: "8090"
  USER_SERVICE_URL: "http://user-service:8081"
  APP_GEOCODING_PROVIDER: "nominatim"
  APP_GEOCODING_NOMINATIM_USER_AGENT: "NeuroGuard-ConsultationService/1.0"
  APP_DISTANCE_MATRIX_PROVIDER: "google"
  APP_LOCATION_STREAMING_ENABLED: "true"
  APP_WEBSOCKET_ENABLED: "true"
