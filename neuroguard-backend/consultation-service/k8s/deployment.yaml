apiVersion: apps/v1
kind: Deployment
metadata:
  name: consultation-service
  namespace: neuroguard
  labels:
    app: consultation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consultation-service
  template:
    metadata:
      labels:
        app: consultation-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mysql-service 3306; do echo 'waiting for mysql-service:3306'; sleep 5; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-service 6379; do echo 'waiting for redis-service:6379'; sleep 5; done
        - name: wait-for-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z eureka-server 8761; do echo 'waiting for eureka-server:8761'; sleep 5; done
      containers:
        - name: consultation-service
          image: YOUR_DOCKERHUB_USER/consultation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: consultation-service-config
            - secretRef:
                name: consultation-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
