apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: forum-service-monitor
  namespace: monitoring
  labels:
    app: forum-service
spec:
  selector:
    matchLabels:
      app: forum-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
