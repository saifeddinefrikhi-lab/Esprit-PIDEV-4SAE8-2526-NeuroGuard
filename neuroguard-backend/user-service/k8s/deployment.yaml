apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 10830313/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: root
