apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: default
data:
  application.yml: |
    server:
      port: 8082
    
    spring:
      application:
        name: user-service
      
      datasource:
        url: jdbc:mysql://mysql-service:3306/neuroguard_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
      
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQL8Dialect
            format_sql: true
      
      mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
          mail:
            smtp:
              auth: true
              starttls:
                enable: true
              ssl:
                trust: smtp.gmail.com
      
      cloud:
        config:
          uri: http://config-service:8888
          fail-fast: true
          retry:
            initial-interval: 1000
            max-attempts: 6
            max-interval: 2000
            multiplier: 1.1
    
    eureka:
      client:
        service-url:
          defaultZone: http://eureka-service:8761/eureka
        register-with-eureka: true
        fetch-registry: true
        healthcheck:
          enabled: true
      instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 30
        lease-expiration-duration-in-seconds: 90
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
      metrics:
        export:
          prometheus:
            enabled: true
    
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000
    
    logging:
      level:
        com.neuroguard.userservice: INFO
        org.springframework.security: DEBUG
        org.springframework.web: DEBUG
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file:
        name: /logs/user-service.log
