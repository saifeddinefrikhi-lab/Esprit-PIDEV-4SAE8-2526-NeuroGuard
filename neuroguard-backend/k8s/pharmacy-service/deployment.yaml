apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-service
  namespace: neuroguard
  labels:
    app: pharmacy-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pharmacy-service
  template:
    metadata:
      labels:
        app: pharmacy-service
        version: v1
    spec:
      initContainers:
      - name: wait-for-mysql
        image: alpine:3.19
        command: ['sh', '-c', 'until (echo > /dev/tcp/pharmacy-mysql.neuroguard.svc.cluster.local/3306) >/dev/null 2>&1; do echo "Waiting for MySQL..."; sleep 3; done; echo "MySQL is ready"; sleep 5']
      containers:
      - name: pharmacy-service
        image: ameniferjeni/pharmacy-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_PORT
          value: "8090"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server.neuroguard.svc.cluster.local:8761/eureka"
        - name: SPRING_APPLICATION_NAME
          value: "pharmacy-service"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://pharmacy-mysql.neuroguard.svc.cluster.local:3306/pharmacydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 100
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8090
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-service
  namespace: neuroguard
  labels:
    app: pharmacy-service
spec:
  type: ClusterIP
  ports:
  - port: 8090
    targetPort: 8090
    protocol: TCP
    name: http
  selector:
    app: pharmacy-service
  sessionAffinity: None
