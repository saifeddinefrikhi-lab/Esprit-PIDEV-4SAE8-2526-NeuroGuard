apiVersion: apps/v1
kind: Deployment
metadata:
  name: careplan-service
  namespace: neuroguard
  labels:
    app: careplan-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: careplan-service
  template:
    metadata:
      labels:
        app: careplan-service
        version: v1
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zv mysql.neuroguard.svc.cluster.local 3306; do echo waiting for mysql; sleep 2; done']
      containers:
      - name: careplan-service
        image: ameniferjeni/careplan-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_PORT
          value: "8081"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server.neuroguard.svc.cluster.local:8761/eureka"
        - name: SPRING_APPLICATION_NAME
          value: "careplan-service"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql.neuroguard.svc.cluster.local:3306/careplandb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: careplan-db-secret
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: careplan-db-secret
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: careplan-service
  namespace: neuroguard
  labels:
    app: careplan-service
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: careplan-service
  sessionAffinity: None