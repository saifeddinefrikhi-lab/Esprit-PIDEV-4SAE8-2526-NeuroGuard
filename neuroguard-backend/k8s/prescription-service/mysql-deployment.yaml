apiVersion: apps/v1
kind: Deployment
metadata:
  name: prescription-mysql
  namespace: neuroguard
  labels:
    app: prescription-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prescription-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prescription-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: prescriptiondb
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -prootpass --silent"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -prootpass --silent"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prescription-mysql
  namespace: neuroguard
  labels:
    app: prescription-mysql
spec:
  selector:
    app: prescription-mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
