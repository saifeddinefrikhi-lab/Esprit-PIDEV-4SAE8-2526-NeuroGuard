apiVersion: v1
kind: ConfigMap
metadata:
  name: prescription-service-config
  namespace: neuroguard
data:
  application.properties: |
    spring.application.name=prescription-service
    server.port=8089
    spring.profiles.active=prod
    eureka.client.serviceUrl.defaultZone=http://eureka-server.neuroguard.svc.cluster.local:8761/eureka
    eureka.instance.preferIpAddress=true
    management.endpoints.web.exposure.include=health,info,metrics
    management.endpoint.health.show-details=always
    logging.level.root=INFO

    # ── MySQL ────────────────────────────────────────────────────────────────
    spring.datasource.url=jdbc:mysql://mysql.neuroguard.svc.cluster.local:3306/prescriptiondb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
    spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

    # ── JPA / Hibernate ──────────────────────────────────────────────────────
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

    # ── Connection pool ──────────────────────────────────────────────────────
    spring.datasource.hikari.connection-timeout=30000
    spring.datasource.hikari.maximum-pool-size=5
    spring.datasource.hikari.initialization-fail-timeout=120000
    spring.datasource.hikari.auto-commit=true
    spring.datasource.hikari.connection-test-query=SELECT 1
    spring.jpa.properties.hibernate.jdbc.batch_size=20
    spring.jpa.properties.hibernate.order_updates=true
    spring.jpa.properties.hibernate.order_inserts=true
